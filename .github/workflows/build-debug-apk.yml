name: Build Debug APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Stage APK to safe location
        run: |
          mkdir -p /tmp/apk-staging
          cp app/build/outputs/apk/debug/app-debug.apk /tmp/apk-staging/app-debug.apk

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: /tmp/apk-staging/app-debug.apk
          retention-days: 14

  publish:
    name: Publish APK to GitHub Releases
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download debug APK artifact
        uses: actions/download-artifact@v4
        with:
          name: debug-apk
          path: /tmp/apk-staging

      # Publish the APK as a GitHub Release asset instead of committing it to a
      # git branch. Git pushes hard-reject any file over 100 MB, but release
      # assets allow up to 2 GB/file, so the debug APK can keep growing.
      - name: Publish APK to GitHub Releases
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          TIMESTAMP=$(date +'%Y-%m-%d_%H-%M-%S')
          SHORT_SHA=${GITHUB_SHA::7}

          TS_APK="app-debug-${TIMESTAMP}-${SHORT_SHA}.apk"
          cp /tmp/apk-staging/app-debug.apk "${TS_APK}"
          cp /tmp/apk-staging/app-debug.apk app-debug-latest.apk

          # Per-build release: a permanent, timestamped download URL (history).
          gh release create "debug-${TIMESTAMP}-${SHORT_SHA}" "${TS_APK}" \
            --target "${GITHUB_SHA}" \
            --title "Debug APK ${TIMESTAMP} (${SHORT_SHA})" \
            --notes "Debug build from ${GITHUB_REF_NAME} @ ${SHORT_SHA} (${TIMESTAMP})."

          # Rolling 'debug-latest' release: a stable URL that always points at
          # the newest APK. The asset is overwritten in place each run.
          if gh release view debug-latest >/dev/null 2>&1; then
            gh release upload debug-latest app-debug-latest.apk --clobber
            gh release edit debug-latest \
              --notes "Latest debug build from ${GITHUB_REF_NAME} @ ${SHORT_SHA} (${TIMESTAMP})."
          else
            gh release create debug-latest app-debug-latest.apk \
              --title "Latest Debug APK" \
              --notes "Latest debug build from ${GITHUB_REF_NAME} @ ${SHORT_SHA} (${TIMESTAMP})."
          fi
